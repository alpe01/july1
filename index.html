<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다람쥐 그림 보기</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#87CEEB;
    font-family:"Malgun Gothic",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:90%;
    max-width:900px;
    background:white;
    border:6px solid blue;
    border-radius:15px;
    padding:30px;
    text-align:center;
}

h1{
    font-size:42px;
    margin-bottom:25px;
}

.image-area{
    width:100%;
    height:450px;
    background:#f0f0f0;
    border-radius:10px;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

.image-area img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:none;
}

.image-area img.active{
    display:block;
}

.initial-view{
    width:100%;
    height:100%;
    background-image:
    linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.25)),
    url("https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1200&q=80");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;
}

.initial-text{
    color:white;
    font-size:34px;
    font-weight:bold;
    background:rgba(0,0,0,.45);
    padding:20px 40px;
    border-radius:40px;
}

.button-group{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:20px;
}

button{
    background:yellow;
    color:black;
    border:2px solid #999900;
    border-radius:8px;
    padding:12px 30px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

button.active{
    background:red;
    color:white;
}

.footer{
    margin-top:30px;
    font-size:34px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

    <h1>다람쥐 그림 보기</h1>

    <div class="image-area">

        <!-- 초기 화면 -->
        <div id="initialView" class="initial-view">
            <div class="initial-text">
                버튼을 눌러주세요
            </div>
        </div>

        <!-- 그림1 -->
        <img id="img1"
        src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAyNTAzMThfNzkg%2FMDAxNzQyMjU4ODUyNTk0.nR4Agv7kINBs-Ytef3Xclf7i3HFnd4lDKxdcGKXIXuog.00wBu8fXMXXlbZkFQ066M0lVuMnhdfVZaU_Y2Y3oea8g.JPEG%2F1c5a04a75527ca28635152b57d2511a8.jpg&type=a340">

        <!-- 그림2 -->
        <img id="img2"
        src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAyNTExMTVfNzAg%2FMDAxNzYzMTgzODEzOTY4.MEt6CEBdN0YfI5bI3CHg0zGInJoPXXL5AGnXsrjlUp8g.GBqrEeV72pHp3LwfdGIgs4pIkiMNpVgfw-NxbypHw6kg.PNG%2FChatGPT_Image_2025%25B3%25E2_11%25BF%25F9_15%25C0%25CF_%25BF%25C0%25C8%25C4_02_16_38.png&type=a340">

        <!-- 그림3 -->
        <img id="img3"
        src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAyNTA3MjFfODAg%2FMDAxNzUzMDc3NzEzODE0.dK0O6LC1VWvGtUc5RQx1QlWB8FFJHz3Dde3dqFL6QHwg.82qFQzdeeL_Z2ykjJLLzwqNTA-Gej49y_cLjjjQaNS0g.JPEG%2FRodents.jpg&type=a340">

    </div>

    <!-- 버튼 -->
    <div class="button-group">
        <button id="btn1">버튼1</button>
        <button id="btn2">버튼2</button>
        <button id="btn3">버튼3</button>
    </div>

    <div class="footer">
        귀여운 다람쥐
    </div>

</div>

<script>

const initial=document.getElementById("initialView");

const img1=document.getElementById("img1");
const img2=document.getElementById("img2");
const img3=document.getElementById("img3");

const btn1=document.getElementById("btn1");
const btn2=document.getElementById("btn2");
const btn3=document.getElementById("btn3");

function reset(){

    initial.style.display="none";

    img1.classList.remove("active");
    img2.classList.remove("active");
    img3.classList.remove("active");

    btn1.classList.remove("active");
    btn2.classList.remove("active");
    btn3.classList.remove("active");
}

btn1.onclick=function(){

    reset();

    img1.classList.add("active");
    btn1.classList.add("active");

}

btn2.onclick=function(){

    reset();

    img2.classList.add("active");
    btn2.classList.add("active");

}

btn3.onclick=function(){

    reset();

    img3.classList.add("active");
    btn3.classList.add("active");

}

</script>

</body>
</html>
